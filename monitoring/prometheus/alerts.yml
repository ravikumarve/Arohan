groups:
  - name: arohan_alerts
    interval: 30s
    rules:
      # API Health Alerts
      - alert: APIDown
        expr: up{job="arohan-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: arohan-api
        annotations:
          summary: "AROHAN API is down"
          description: "AROHAN API has been down for more than 1 minute"

      - alert: APIHighErrorRate
        expr: rate(arohan_interview_sessions_failed[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: arohan-api
        annotations:
          summary: "High API error rate"
          description: "API error rate is {{ $value }} errors per second"

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: arohan-api
        annotations:
          summary: "High API latency"
          description: "95th percentile latency is {{ $value }} seconds"

      # Database Alerts
      - alert: DatabaseDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "Database is down"
          description: "PostgreSQL database has been down for more than 1 minute"

      - alert: DatabaseConnectionPoolExhausted
        expr: arohan_db_connections_active > 80
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "{{ $value }} active database connections"

      - alert: DatabaseSlowQueries
        expr: histogram_quantile(0.95, rate(arohan_db_queries_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Slow database queries detected"
          description: "95th percentile query latency is {{ $value }} seconds"

      # Redis Alerts
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis cache has been down for more than 1 minute"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      # RabbitMQ Alerts
      - alert: RabbitMQDown
        expr: up{job="rabbitmq-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: rabbitmq
        annotations:
          summary: "RabbitMQ is down"
          description: "RabbitMQ message broker has been down for more than 1 minute"

      - alert: QueueBacklog
        expr: arohan_celery_queue_length > 1000
        for: 5m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "High queue backlog"
          description: "Queue has {{ $value }} pending tasks"

      - alert: QueueNotProcessing
        expr: rate(arohan_celery_tasks_total[5m]) == 0
        for: 10m
        labels:
          severity: critical
          service: rabbitmq
        annotations:
          summary: "Queue not processing"
          description: "No tasks have been processed in the last 10 minutes"

      # STT Pipeline Alerts
      - alert: STTServiceDown
        expr: rate(arohan_stt_requests_failed[5m]) / rate(arohan_stt_requests_total[5m]) > 0.5
        for: 5m
        labels:
          severity: critical
          service: stt
        annotations:
          summary: "STT service failure rate high"
          description: "STT service failure rate is {{ $value | humanizePercentage }}"

      - alert: STTSlowProcessing
        expr: histogram_quantile(0.95, rate(arohan_stt_requests_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
          service: stt
        annotations:
          summary: "STT processing slow"
          description: "95th percentile STT processing time is {{ $value }} seconds"

      # External API Alerts
      - alert: ExternalAPIHighFailureRate
        expr: rate(arohan_external_api_requests_failed[5m]) / rate(arohan_external_api_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: external-api
        annotations:
          summary: "External API high failure rate"
          description: "External API failure rate is {{ $value | humanizePercentage }}"

      - alert: TwilioAPIFailure
        expr: rate(arohan_external_api_requests_failed{service="twilio"}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: twilio
        annotations:
          summary: "Twilio API failures"
          description: "Twilio API failure rate is {{ $value | humanizePercentage }}"

      - alert: MetaAPIFailure
        expr: rate(arohan_external_api_requests_failed{service="meta"}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: meta
        annotations:
          summary: "Meta API failures"
          description: "Meta API failure rate is {{ $value | humanizePercentage }}"

      # Agent Alerts
      - alert: AgentHighErrorRate
        expr: rate(arohan_agent_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: agents
        annotations:
          summary: "Agent high error rate"
          description: "Agent error rate is {{ $value }} errors per second"

      - alert: AgentSlowExecution
        expr: histogram_quantile(0.95, rate(arohan_agent_execution_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: agents
        annotations:
          summary: "Agent slow execution"
          description: "95th percentile agent execution time is {{ $value }} seconds"

      # Business Logic Alerts
      - alert: HighDropOffRate
        expr: rate(arohan_drop_off_recovery_total[5m]) / rate(arohan_interview_sessions_total[5m]) > 0.3
        for: 10m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "High interview drop-off rate"
          description: "Interview drop-off rate is {{ $value | humanizePercentage }}"

      - alert: LowCompletionRate
        expr: rate(arohan_interview_sessions_completed[5m]) / rate(arohan_interview_sessions_total[5m]) < 0.5
        for: 15m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Low interview completion rate"
          description: "Interview completion rate is {{ $value | humanizePercentage }}"

      # System Resource Alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Low disk space"
          description: "Disk space is {{ $value }}% available"