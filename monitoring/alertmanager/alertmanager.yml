# Inhibition rules
inhibit_rules:
  # If critical alert is firing, inhibit warning alerts for same instance
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # If API is down, inhibit all API-specific alerts
  - source_match:
      alertname: 'APIDown'
    target_match_re:
      service: 'arohan-api'
    equal: ['instance']

  # If Database is down, inhibit all database-specific alerts
  - source_match:
      alertname: 'DatabaseDown'
    target_match_re:
      service: 'postgres'
    equal: ['instance']