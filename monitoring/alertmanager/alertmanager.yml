global:
  resolve_timeout: 5m
  # Slack webhook configuration (to be configured)
  # slack_api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

# Route configuration
route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  routes:
    # Critical alerts go to critical receiver
    - match:
        severity: critical
      receiver: 'critical'
      continue: false

    # Warning alerts go to warning receiver
    - match:
        severity: warning
      receiver: 'warning'
      continue: false

    # API-specific alerts
    - match:
        service: arohan-api
      receiver: 'api-team'
      continue: true

    # Database-specific alerts
    - match:
        service: postgres
      receiver: 'database-team'
      continue: true

    # STT-specific alerts
    - match:
        service: stt
      receiver: 'ml-team'
      continue: true

