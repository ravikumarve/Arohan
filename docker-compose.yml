version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: arohan-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arohan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arohan_dev}
      POSTGRES_DB: ${POSTGRES_DB:-arohan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arohan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arohan-network

  # Redis for Session State
  redis:
    image: redis:7-alpine
    container_name: arohan-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_dev}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arohan-network

  # RabbitMQ for Task Queues
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: arohan-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-arohan}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_dev}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/arohan}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arohan-network

  # FastAPI Backend Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arohan-api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-arohan}:${POSTGRES_PASSWORD:-arohan_dev}@postgres:5432/${POSTGRES_DB:-arohan}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-arohan}:${RABBITMQ_PASSWORD:-rabbitmq_dev}@rabbitmq:5672/${RABBITMQ_VHOST:-/arohan}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_secret_change_in_production}
      - JWT_ALGORITHM=RS256
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - arohan-network
    restart: unless-stopped

  # Celery Worker for Audio Processing
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arohan-celery-worker
    command: celery -A src.tasks worker --loglevel=info --concurrency=8
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-arohan}:${POSTGRES_PASSWORD:-arohan_dev}@postgres:5432/${POSTGRES_DB:-arohan}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-arohan}:${RABBITMQ_PASSWORD:-rabbitmq_dev}@rabbitmq:5672/${RABBITMQ_VHOST:-/arohan}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
      - ./audio:/app/audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - arohan-network
    restart: unless-stopped

  # Celery Beat for Scheduled Tasks
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arohan-celery-beat
    command: celery -A src.tasks beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-arohan}:${POSTGRES_PASSWORD:-arohan_dev}@postgres:5432/${POSTGRES_DB:-arohan}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-arohan}:${RABBITMQ_PASSWORD:-rabbitmq_dev}@rabbitmq:5672/${RABBITMQ_VHOST:-/arohan}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - arohan-network
    restart: unless-stopped

  # Next.js Dashboard (Optional - for development)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: arohan-dashboard
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NODE_ENV=${NODE_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - arohan-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  arohan-network:
    driver: bridge